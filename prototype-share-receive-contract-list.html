<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家装平台小程序原型 - 分享的项目合同列表</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 1px solid #ddd;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background: white;
        }

        .status-bar {
            height: 44px;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 14px;
        }

        .nav-bar {
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #e8e8e8;
            position: relative;
        }

        .back {
            font-size: 16px;
            color: #1890FF;
        }

        .title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .close-btn {
            font-size: 16px;
            color: #1890FF;
        }

        .page-content {
            height: calc(100% - 88px);
            overflow-y: auto;
            padding: 16px;
        }

        .shared-hint {
            background: #FFF7E6;
            color: #FA8C16;
            padding: 8px 16px;
            font-size: 14px;
            text-align: center;
            border-bottom: 1px solid #FFD591;
            margin-bottom: 16px;
        }

        .project-card {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .project-card .project-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .project-card .project-title .icon {
            margin-right: 8px;
        }

        .project-card .project-status {
            font-size: 14px;
            color: #52C41A;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .section-title .icon {
            margin-right: 8px;
        }

        .contract-list {
            margin-bottom: 24px;
        }

        .contract-card {
            border: 1px solid #e8e8e8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .contract-card:hover {
            background: #f8f8f8;
        }

        .contract-card .contract-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .contract-card .contract-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        .contract-card .contract-title .icon {
            margin-right: 8px;
        }

        .contract-card .arrow {
            color: #8C8C8C;
        }

        .contract-card .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .contract-card .info-row .label {
            color: #8C8C8C;
        }

        .contract-card .info-row .value {
            color: #262626;
        }

        .contract-card .info-row .value.encrypted {
            color: #8C8C8C;
        }

        .contract-card .info-row .value .lock {
            margin-left: 4px;
            color: #8C8C8C;
        }

        .join-btn {
            width: 100%;
            height: 44px;
            background: #1890FF;
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 16px;
            font-weight: 500;
            margin-top: 24px;
            margin-bottom: 16px;
        }

        .login-hint {
            text-align: center;
            font-size: 14px;
            color: #8C8C8C;
            margin-bottom: 20px;
        }

        .login-hint a {
            color: #1890FF;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="time">9:41</div>
            <div class="icons">📶 🔋</div>
        </div>

        <div class="nav-bar">
            <div class="back" onclick="window.history.back()">← 返回</div>
            <div class="title">项目合同</div>
            <div class="close-btn" onclick="window.close()">关闭</div>
        </div>

        <div class="page-content">
            <!-- 分享提示 -->
            <div class="shared-hint">
                提示：您正在查看分享的项目
            </div>

            <!-- 项目基本信息 -->
            <div class="project-card">
                <div class="project-title">
                    <span class="icon">🏠</span>
                    <span>XX小区整体装修</span>
                </div>
                <div class="project-status">水电阶段 · 进行中</div>
            </div>

            <!-- 全部合同列表 -->
            <div class="contract-list">
                <div class="section-title">
                    <span class="icon">📄</span>
                    <span>全部合同</span>
                </div>

                <!-- 水电合同 -->
                <div class="contract-card" onclick="window.location.href='prototype-share-receive-contract-detail.html?contractId=contract-001'">
                    <div class="contract-header">
                        <div class="contract-title">
                            <span class="icon">⚡</span>
                            <span>水电合同</span>
                        </div>
                        <span class="arrow">→</span>
                    </div>
                    <div class="info-row">
                        <span class="label">合同状态</span>
                        <span class="value">已签约</span>
                    </div>
                    <div class="info-row">
                        <span class="label">合同金额</span>
                        <span class="value encrypted">*** 元 <span class="lock">🔒</span></span>
                    </div>
                    <div class="info-row">
                        <span class="label">工期</span>
                        <span class="value">15天</span>
                    </div>
                </div>

                <!-- 泥瓦合同 -->
                <div class="contract-card" onclick="window.location.href='prototype-share-receive-contract-detail.html?contractId=contract-002'">
                    <div class="contract-header">
                        <div class="contract-title">
                            <span class="icon">🧱</span>
                            <span>泥瓦合同</span>
                        </div>
                        <span class="arrow">→</span>
                    </div>
                    <div class="info-row">
                        <span class="label">合同状态</span>
                        <span class="value">已签约</span>
                    </div>
                    <div class="info-row">
                        <span class="label">合同金额</span>
                        <span class="value encrypted">*** 元 <span class="lock">🔒</span></span>
                    </div>
                    <div class="info-row">
                        <span class="label">工期</span>
                        <span class="value">20天</span>
                    </div>
                </div>

                <!-- 木工合同 -->
                <div class="contract-card" onclick="window.location.href='prototype-share-receive-contract-detail.html?contractId=contract-003'">
                    <div class="contract-header">
                        <div class="contract-title">
                            <span class="icon">🪚</span>
                            <span>木工合同</span>
                        </div>
                        <span class="arrow">→</span>
                    </div>
                    <div class="info-row">
                        <span class="label">合同状态</span>
                        <span class="value">已签约</span>
                    </div>
                    <div class="info-row">
                        <span class="label">合同金额</span>
                        <span class="value encrypted">*** 元 <span class="lock">🔒</span></span>
                    </div>
                    <div class="info-row">
                        <span class="label">工期</span>
                        <span class="value">25天</span>
                    </div>
                </div>

                <!-- 油漆合同 -->
                <div class="contract-card" onclick="window.location.href='prototype-share-receive-contract-detail.html?contractId=contract-004'">
                    <div class="contract-header">
                        <div class="contract-title">
                            <span class="icon">🎨</span>
                            <span>油漆合同</span>
                        </div>
                        <span class="arrow">→</span>
                    </div>
                    <div class="info-row">
                        <span class="label">合同状态</span>
                        <span class="value">已签约</span>
                    </div>
                    <div class="info-row">
                        <span class="label">合同金额</span>
                        <span class="value encrypted">*** 元 <span class="lock">🔒</span></span>
                    </div>
                    <div class="info-row">
                        <span class="label">工期</span>
                        <span class="value">10天</span>
                    </div>
                </div>
            </div>

            <!-- 申请加入按钮 -->
            <button class="join-btn" onclick="window.location.href='prototype-join-request.html'">申请加入项目</button>

            <!-- 登录提示 -->
            <div class="login-hint">
                登录后可查看更多
                <a href="#">[立即登录]</a>
            </div>
        </div>
    </div>

    <div class="page-nav">
        <div class="page-nav-title">原型导航</div>
        <a href="share-navigation.html" class="page-nav-item active">分享功能导航</a>
        <a href="prototype-share-receive.html" class="page-nav-item">项目详情分享</a>
        <a href="prototype-share-receive-activity.html" class="page-nav-item">项目动态分享</a>
        <a href="prototype-share-receive-task.html" class="page-nav-item">项目任务分享</a>
        <a href="prototype-share-receive-contract-list.html" class="page-nav-item">项目合同列表</a>
        <a href="prototype-share-receive-contract-detail.html" class="page-nav-item">项目合同详情</a>
        <a href="prototype-join-request.html" class="page-nav-item">申请加入页</a>
    </div>
</body>
</html>
