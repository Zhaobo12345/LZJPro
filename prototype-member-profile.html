<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人员档案</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .profile-header {
            background: linear-gradient(135deg, #1890FF 0%, #40A9FF 100%);
            padding: 24px 16px;
            text-align: center;
            color: #FFFFFF;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            margin: 0 auto 12px;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }
        
        .profile-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .profile-role {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            background: #FFFFFF;
            margin: -20px 12px 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #1890FF;
        }
        
        .stat-label {
            font-size: 11px;
            color: #8C8C8C;
            margin-top: 2px;
        }
        
        .info-section {
            background: #FFFFFF;
            margin: 0 12px 12px;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #262626;
            padding: 12px 16px;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-size: 13px;
            color: #8C8C8C;
        }
        
        .info-value {
            font-size: 13px;
            color: #262626;
        }
        
        .info-value.highlight {
            color: #1890FF;
        }
        
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 16px;
        }
        
        .skill-tag {
            padding: 4px 12px;
            background: #E6F7FF;
            color: #1890FF;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .project-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
        }
        
        .project-item:last-child {
            border-bottom: none;
        }
        
        .project-item:hover {
            background: #FAFAFA;
        }
        
        .project-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1890FF 0%, #40A9FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-size: 16px;
            margin-right: 12px;
        }
        
        .project-info {
            flex: 1;
        }
        
        .project-name {
            font-size: 14px;
            font-weight: 500;
            color: #262626;
        }
        
        .project-role {
            font-size: 12px;
            color: #8C8C8C;
            margin-top: 2px;
        }
        
        .project-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .project-status.active {
            background: #E6F7FF;
            color: #1890FF;
        }
        
        .project-status.completed {
            background: #F6FFED;
            color: #52C41A;
        }
        
        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 16px 12px;
            padding: 12px;
            background: linear-gradient(135deg, #1890FF 0%, #40A9FF 100%);
            color: #FFFFFF;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .contact-btn:active {
            transform: scale(0.98);
        }
        
        .contact-btn .icon {
            margin-right: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 24px;
            color: #8C8C8C;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="time">9:41</div>
            <div class="icons">📶 🔋</div>
        </div>
        
        <div class="nav-bar">
            <div class="back" onclick="history.back()">← 返回</div>
            <div class="title centered">人员档案</div>
            <div class="actions">
                <div class="action-btn" onclick="toggleActionMenu()">⋯</div>
                <div class="action-btn" onclick="alert('关闭小程序')">✕</div>
            </div>
            <div class="action-menu" id="actionMenu">
                <div class="action-menu-item" onclick="shareToFriend(); closeActionMenu();">
                    <span class="icon">📤</span>
                    <span>分享给朋友</span>
                </div>
            </div>
        </div>
        
        <div class="page-content page-content--full" style="padding-bottom: 60px;">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">张</div>
                <div class="profile-name" id="profileName">张三</div>
                <div class="profile-role" id="profileRole">项目经理</div>
            </div>
            
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-value" id="statProjects">5</div>
                    <div class="stat-label">参与项目</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statTasks">28</div>
                    <div class="stat-label">完成任务</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statScore">4.9</div>
                    <div class="stat-label">综合评分</div>
                </div>
            </div>
            
            <div class="info-section">
                <div class="section-title">基本信息</div>
                <div class="info-item">
                    <span class="info-label">手机号码</span>
                    <span class="info-value" id="infoPhone">138****8888</span>
                </div>
                <div class="info-item">
                    <span class="info-label">所属公司</span>
                    <span class="info-value" id="infoCompany">良造家装饰有限公司</span>
                </div>
                <div class="info-item">
                    <span class="info-label">从业年限</span>
                    <span class="info-value" id="infoExperience">8年</span>
                </div>
                <div class="info-item">
                    <span class="info-label">入行时间</span>
                    <span class="info-value" id="infoJoinDate">2016年3月</span>
                </div>
            </div>
            
            <div class="info-section">
                <div class="section-title">专业技能</div>
                <div class="tag-list" id="skillList">
                    <span class="skill-tag">项目管理</span>
                    <span class="skill-tag">水电施工</span>
                    <span class="skill-tag">团队协调</span>
                    <span class="skill-tag">质量控制</span>
                </div>
            </div>
            
            <div class="info-section">
                <div class="section-title">参与项目</div>
                <div id="projectList">
                    <div class="project-item" onclick="location.href='prototype-project-detail.html'">
                        <div class="project-icon">🏠</div>
                        <div class="project-info">
                            <div class="project-name">XX小区整体装修</div>
                            <div class="project-role">项目经理</div>
                        </div>
                        <div class="project-status active">进行中</div>
                    </div>
                    <div class="project-item" onclick="location.href='prototype-project-detail.html'">
                        <div class="project-icon">🏢</div>
                        <div class="project-info">
                            <div class="project-name">YY花园别墅装修</div>
                            <div class="project-role">项目经理</div>
                        </div>
                        <div class="project-status active">进行中</div>
                    </div>
                    <div class="project-item" onclick="location.href='prototype-project-detail.html'">
                        <div class="project-icon">🏬</div>
                        <div class="project-info">
                            <div class="project-name">ZZ商业办公空间</div>
                            <div class="project-role">项目经理</div>
                        </div>
                        <div class="project-status completed">已完成</div>
                    </div>
                </div>
            </div>
            
            <div class="info-section">
                <div class="section-title">资质证书</div>
                <div class="tag-list" id="certList">
                    <span class="skill-tag">一级建造师</span>
                    <span class="skill-tag">安全员证</span>
                    <span class="skill-tag">项目经理证</span>
                </div>
            </div>
            
            <div class="contact-btn" onclick="contactMember()">
                <span class="icon">📞</span>
                <span>联系TA</span>
            </div>
            
            <div style="height: 20px;"></div>
        </div>
    </div>
    
    <div class="page-nav">
        <div class="page-nav-title">原型导航</div>
        <a href="prototype-home.html" class="page-nav-item">首页</a>
        <a href="prototype-project-list.html" class="page-nav-item">项目列表</a>
        <a href="prototype-project-detail.html" class="page-nav-item">项目详情</a>
        <a href="prototype-member.html" class="page-nav-item">项目成员</a>
        <a href="prototype-member-profile.html" class="page-nav-item active">人员档案</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const memberId = urlParams.get('id') || '1';
        const memberName = urlParams.get('name') || '张三';
        const memberRole = urlParams.get('role') || '项目经理';
        
        const memberData = {
            '1': {
                name: '张三',
                avatar: '张',
                role: '项目经理',
                phone: '138****8888',
                company: '良造家装饰有限公司',
                experience: '8年',
                joinDate: '2016年3月',
                projects: 5,
                tasks: 28,
                score: 4.9,
                skills: ['项目管理', '水电施工', '团队协调', '质量控制'],
                certs: ['一级建造师', '安全员证', '项目经理证']
            },
            '2': {
                name: '李四',
                avatar: '李',
                role: '水电工长',
                phone: '139****6666',
                company: '良造家装饰有限公司',
                experience: '6年',
                joinDate: '2018年5月',
                projects: 12,
                tasks: 86,
                score: 4.8,
                skills: ['水电施工', '管道安装', '电路布线'],
                certs: ['电工证', '焊工证']
            },
            '3': {
                name: '王五',
                avatar: '王',
                role: '泥瓦工长',
                phone: '137****5555',
                company: '良造家装饰有限公司',
                experience: '10年',
                joinDate: '2014年2月',
                projects: 18,
                tasks: 120,
                score: 4.9,
                skills: ['瓷砖铺贴', '防水施工', '墙面处理'],
                certs: ['泥工证', '防水工证']
            },
            '4': {
                name: '赵六',
                avatar: '赵',
                role: '木工工长',
                phone: '136****4444',
                company: '良造家装饰有限公司',
                experience: '7年',
                joinDate: '2017年8月',
                projects: 9,
                tasks: 65,
                score: 4.7,
                skills: ['木工制作', '家具安装', '吊顶施工'],
                certs: ['木工证']
            },
            '5': {
                name: '孙七',
                avatar: '孙',
                role: '油漆工长',
                phone: '135****3333',
                company: '良造家装饰有限公司',
                experience: '5年',
                joinDate: '2019年3月',
                projects: 8,
                tasks: 52,
                score: 4.6,
                skills: ['墙面涂刷', '壁纸施工', '艺术涂料'],
                certs: ['油漆工证']
            }
        };
        
        function loadMemberProfile() {
            const data = memberData[memberId] || memberData['1'];
            
            document.getElementById('profileAvatar').textContent = data.avatar;
            document.getElementById('profileName').textContent = data.name;
            document.getElementById('profileRole').textContent = data.role;
            document.getElementById('statProjects').textContent = data.projects;
            document.getElementById('statTasks').textContent = data.tasks;
            document.getElementById('statScore').textContent = data.score;
            document.getElementById('infoPhone').textContent = data.phone;
            document.getElementById('infoCompany').textContent = data.company;
            document.getElementById('infoExperience').textContent = data.experience;
            document.getElementById('infoJoinDate').textContent = data.joinDate;
            
            const skillList = document.getElementById('skillList');
            skillList.innerHTML = data.skills.map(skill => 
                `<span class="skill-tag">${skill}</span>`
            ).join('');
            
            const certList = document.getElementById('certList');
            certList.innerHTML = data.certs.map(cert => 
                `<span class="skill-tag">${cert}</span>`
            ).join('');
        }
        
        function toggleActionMenu() {
            const actionMenu = document.getElementById('actionMenu');
            if (actionMenu) {
                actionMenu.classList.toggle('show');
            }
        }
        
        function closeActionMenu() {
            const actionMenu = document.getElementById('actionMenu');
            if (actionMenu) {
                actionMenu.classList.remove('show');
            }
        }
        
        function shareToFriend() {
            // 模拟分享功能，显示分享选项
            alert('分享功能已触发，请选择分享方式');
            // 实际项目中这里会调用微信分享API
        }
        
        function contactMember() {
            alert('即将拨打 ' + (memberData[memberId]?.phone || '138****8888'));
        }
        
        loadMemberProfile();
    </script>
</body>
</html>
