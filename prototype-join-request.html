<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家装平台小程序原型 - 申请加入项目</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            border: 1px solid #ddd;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background: white;
        }

        .status-bar {
            height: 44px;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 14px;
        }

        .nav-bar {
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #e8e8e8;
            position: relative;
        }

        .back {
            font-size: 16px;
            color: #1890FF;
        }

        .title {
            flex: 1;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .close-btn {
            font-size: 16px;
            color: #1890FF;
        }

        .page-content {
            height: calc(100% - 88px);
            overflow-y: auto;
            padding: 16px;
        }

        .project-info {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .project-info .project-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .project-info .project-title .icon {
            margin-right: 8px;
        }

        .project-info .project-manager {
            font-size: 14px;
            color: #595959;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #262626;
        }

        .form-group textarea {
            width: 100%;
            height: 100px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
        }

        .role-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .role-item {
            padding: 8px 16px;
            border: 1px solid #e8e8e8;
            border-radius: 20px;
            font-size: 14px;
            color: #595959;
            cursor: pointer;
        }

        .role-item.selected {
            background: #1890FF;
            color: white;
            border-color: #1890FF;
        }

        .form-group input {
            width: 100%;
            height: 44px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            height: 44px;
            background: #1890FF;
            color: white;
            border: none;
            border-radius: 22px;
            font-size: 16px;
            font-weight: 500;
            margin-top: 24px;
        }

        .hint {
            text-align: center;
            font-size: 14px;
            color: #8C8C8C;
            margin-top: 16px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="time">9:41</div>
            <div class="icons">📶 🔋</div>
        </div>

        <div class="nav-bar">
            <div class="back" onclick="window.history.back()">← 返回</div>
            <div class="title">申请加入项目</div>
            <div class="close-btn" onclick="window.close()">关闭</div>
        </div>

        <div class="page-content">
            <!-- 项目信息 -->
            <div class="project-info">
                <div class="project-title">
                    <span class="icon">🏠</span>
                    <span>XX小区整体装修</span>
                </div>
                <div class="project-manager">
                    项目经理：李工
                </div>
            </div>

            <!-- 申请理由 -->
            <div class="form-group">
                <label for="reason">申请理由（必填）</label>
                <textarea id="reason" placeholder="请输入申请加入项目的理由"></textarea>
            </div>

            <!-- 选择角色 -->
            <div class="form-group">
                <label>选择角色</label>
                <div class="role-selector">
                    <div class="role-item" onclick="toggleRole(this)">水电工</div>
                    <div class="role-item" onclick="toggleRole(this)">泥瓦工</div>
                    <div class="role-item" onclick="toggleRole(this)">木工</div>
                    <div class="role-item" onclick="toggleRole(this)">油漆工</div>
                    <div class="role-item" onclick="toggleRole(this)">其他</div>
                </div>
            </div>

            <!-- 联系方式 -->
            <div class="form-group">
                <label for="phone">联系方式（必填）</label>
                <input type="tel" id="phone" placeholder="请输入手机号">
            </div>

            <!-- 提交按钮 -->
            <button class="submit-btn" onclick="submitJoinRequest()">提交申请</button>

            <!-- 提示信息 -->
            <div class="hint">
                提示：申请提交后，项目经理将<br>
                收到通知并进行审批
            </div>
        </div>
    </div>
    
    <div class="page-nav">
        <div class="page-nav-title">原型导航</div>
        <a href="prototype-home.html" class="page-nav-item">首页</a>
        <a href="prototype-project-detail.html" class="page-nav-item">项目详情</a>
        <a href="prototype-share-receive.html" class="page-nav-item">分享接收页</a>
        <a href="prototype-join-request.html" class="page-nav-item active">申请加入页</a>
    </div>
    
    <script>
        // 切换角色选择
        function toggleRole(element) {
            // 移除其他角色的选中状态
            document.querySelectorAll('.role-item').forEach(item => {
                item.classList.remove('selected');
            });
            // 添加当前角色的选中状态
            element.classList.add('selected');
        }

        // 提交申请
        function submitJoinRequest() {
            const reason = document.getElementById('reason').value;
            const phone = document.getElementById('phone').value;
            const selectedRole = document.querySelector('.role-item.selected');

            // 验证表单
            if (!reason) {
                alert('请输入申请理由');
                return;
            }

            if (!phone) {
                alert('请输入联系方式');
                return;
            }

            if (!selectedRole) {
                alert('请选择角色');
                return;
            }

            // 模拟提交
            console.log('提交申请:', {
                reason: reason,
                phone: phone,
                role: selectedRole.textContent
            });

            // 显示成功提示
            alert('申请已提交，等待项目经理审批');
            // 跳转回分享接收页
            window.location.href = 'prototype-share-receive.html';
        }
    </script>
</body>
</html>
